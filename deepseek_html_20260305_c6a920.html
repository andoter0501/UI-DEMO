<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLBot · 魔方风格</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', 'Inter', system-ui, sans-serif;
        }
        body {
            background-color: #FDF8F2;
            height: 100vh;
            display: flex;
            color: #4A3B2F;
        }
        .sidebar {
            width: 260px;
            background: #f9efe4;
            border-radius: 0 40px 40px 0;
            display: flex;
            flex-direction: column;
            padding: 32px 0;
            box-shadow: 6px 0 24px rgba(255,138,92,0.1);
        }
        .logo-area {
            padding: 0 24px 36px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #FF8A5C, #FF6B6B);
            border-radius: 20px;
        }
        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(145deg, #FF8A5C, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 14px 24px;
            margin: 6px 16px;
            border-radius: 40px;
            color: #6b4f3f;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
            cursor: default;
        }
        .nav-item i {
            width: 24px;
            font-size: 1.3rem;
            color: #FF8A5C;
        }
        .nav-item.active {
            background: linear-gradient(145deg, #FF8A5C, #FF6B6B);
            color: white;
            box-shadow: 0 12px 18px -8px #ff8a5c80;
        }
        .nav-item.active i {
            color: white;
        }
        .nav-item:hover {
            background: #ffeadd;
        }
        .bottom-nav {
            margin-top: auto;
            padding-top: 20px;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 36px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .workspace {
            background: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 6px 16px #ffd5c0;
            border: 1px solid #ffe3d6;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #A5E1D2;
            border: 3px solid #FF8A5C;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 36px;
            padding: 24px;
            box-shadow: 0 18px 32px -12px #ffb397;
            border: 1px solid #ffede3;
        }
        .stat-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #b37b63;
            text-transform: uppercase;
        }
        .stat-number {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(145deg, #FF8A5C, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 4px;
        }
        .input-section {
            background: white;
            border-radius: 60px;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            box-shadow: 0 16px 30px -10px #ffc8b0;
            margin-bottom: 36px;
            border: 1px solid #ffdbcf;
        }
        .input-section i {
            color: #FF8A5C;
            font-size: 1.4rem;
            margin-right: 16px;
        }
        .input-section input {
            border: none;
            flex: 1;
            font-size: 1rem;
            outline: none;
            background: transparent;
            color: #4A3B2F;
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(145deg, #FF8A5C, #FF6B6B);
            border: none;
            color: white;
            cursor: default;
            box-shadow: 0 4px 12px #ff8a5c;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #5e4737;
        }
        .recent-list {
            background: white;
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 8px 20px #f0dbd0;
        }
        .recent-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #fae2d7;
            gap: 16px;
            font-weight: 500;
        }
        .badge {
            background: #FFE6DC;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #FF6B6B;
            font-weight: 600;
        }
        hr { border: none; border-top: 2px dashed #ffdac8; margin: 24px 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo"></div>
            <span class="logo-text">SQLBot</span>
        </div>
        <div class="nav-item active"><i class="fas fa-comment-dots"></i> 智能问数</div>
        <div class="nav-item"><i class="fas fa-chart-pie"></i> 仪表盘</div>
        <div class="nav-item"><i class="fas fa-database"></i> 数据源</div>
        <div class="nav-item"><i class="fas fa-robot"></i> 小助手</div>
        <div class="nav-item"><i class="fas fa-cog"></i> 设置</div>
        <div class="bottom-nav">
            <div class="nav-item"><i class="fas fa-heart"></i> 帮助</div>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <div class="workspace"><i class="fas fa-smile" style="color:#FF8A5C;"></i> 李小萌的工作台</div>
            <div class="user-area">
                <i class="fas fa-bell" style="color:#FF8A5C; font-size:1.4rem;"></i>
                <div class="avatar"></div>
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <h2 style="font-weight:600;">嗨, 小萌 ✨ 想查点什么？</h2>
            <p style="color:#b68d78;">试试用自然语言提问吧</p>
        </div>
        <div class="card-grid">
            <div class="stat-card"><div class="stat-title">今日提问</div><div class="stat-number">64</div><span>🚀 比昨天多12次</span></div>
            <div class="stat-card"><div class="stat-title">常用表</div><div class="stat-number">8</div><span>订单、用户、产品</span></div>
            <div class="stat-card"><div class="stat-title">仪表盘</div><div class="stat-number">9</div><span>3个新看板</span></div>
        </div>
        <div class="input-section">
            <i class="fas fa-lightbulb"></i>
            <input type="text" placeholder="例如「上海员工数量」「销售额top5」" value="上海员工数量">
            <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 28px;">
            <div>
                <div class="section-title"><i class="fas fa-clock" style="color:#FF8A5C;"></i> 最近提问</div>
                <div class="recent-list">
                    <div class="recent-item"><i class="fas fa-message"></i> 上海员工数量 <span class="badge">342人</span></div>
                    <div class="recent-item"><i class="fas fa-message"></i> 3月订单总额 <span class="badge">¥1.2M</span></div>
                    <div class="recent-item"><i class="fas fa-message"></i> 迟发订单 <span class="badge">23笔</span></div>
                </div>
            </div>
            <div>
                <div class="section-title"><i class="fas fa-database" style="color:#FF6B6B;"></i> 热门数据</div>
                <div class="recent-list">
                    <div class="recent-item"><i class="fas fa-table"></i> 订单表 (MySQL) <span class="badge">3.2w行</span></div>
                    <div class="recent-item"><i class="fas fa-file-excel"></i> 销售预测.csv <span class="badge">刚刚更新</span></div>
                    <div class="recent-item"><i class="fas fa-cloud"></i> 用户画像宽表 <span class="badge">推荐</span></div>
                </div>
            </div>
        </div>
        <hr>
        <div style="display: flex; gap: 24px; color:#a16f5a;">
            <span><i class="fas fa-magic"></i> 今日示例: “上海地区销售额”</span>
            <span><i class="fas fa-star"></i> 4个新术语配置</span>
        </div>
    </div>
</body>
</html>
