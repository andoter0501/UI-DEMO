<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLBot · 星夜风格</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #1A2634;
            height: 100vh;
            display: flex;
            color: #E0E0E0;
        }
        .sidebar {
            width: 260px;
            background: #131e2a;
            border-right: 1px solid #2b3a48;
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }
        .logo-area {
            padding: 0 20px 28px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo {
            width: 32px;
            height: 32px;
            background: #2EE6D3;
            border-radius: 8px;
            box-shadow: 0 0 10px #2ee6d388;
        }
        .logo-text {
            font-weight: 600;
            font-size: 1.2rem;
            color: #ffffff;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 8px;
            color: #a0b3cc;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.2s;
            cursor: default;
        }
        .nav-item i {
            width: 22px;
            font-size: 1.2rem;
            color: #6d8aad;
        }
        .nav-item.active {
            background: #2EE6D3;
            color: #0f1a24;
        }
        .nav-item.active i {
            color: #0f1a24;
        }
        .nav-item:hover {
            background: #24303e;
        }
        .bottom-nav {
            margin-top: auto;
            border-top: 1px solid #2b3a48;
            padding-top: 16px;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .workspace {
            background: #24303E;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #3a4a5a;
            color: #ccc;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #9B6DFF;
            box-shadow: 0 0 12px #9b6dff;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #24303E;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #364958;
            box-shadow: 0 8px 18px rgba(46,230,211,0.1);
        }
        .stat-title {
            font-size: 0.85rem;
            color: #99b8d4;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 600;
            color: #2EE6D3;
            margin-top: 6px;
        }
        .input-section {
            background: #24303E;
            border-radius: 40px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            border: 1px solid #3f5567;
            margin-bottom: 32px;
        }
        .input-section i {
            color: #9B6DFF;
            font-size: 1.2rem;
            margin-right: 12px;
        }
        .input-section input {
            border: none;
            flex: 1;
            font-size: 1rem;
            outline: none;
            background: transparent;
            color: #eee;
        }
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #9B6DFF;
            border: none;
            color: white;
            cursor: default;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ccc;
        }
        .recent-list {
            background: #1f2c38;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #2e3f4d;
        }
        .recent-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #2e3f4d;
            gap: 12px;
        }
        .badge {
            background: #2b3e50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #b0d0f0;
        }
        hr { border: 0.5px solid #2e3f4d; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo"></div>
            <span class="logo-text">SQLBot</span>
        </div>
        <div class="nav-item active"><i class="fas fa-comment-dots"></i> 智能问数</div>
        <div class="nav-item"><i class="fas fa-chart-pie"></i> 仪表盘</div>
        <div class="nav-item"><i class="fas fa-database"></i> 数据源</div>
        <div class="nav-item"><i class="fas fa-robot"></i> 小助手</div>
        <div class="nav-item"><i class="fas fa-cog"></i> 设置</div>
        <div class="bottom-nav">
            <div class="nav-item"><i class="fas fa-question-circle"></i> 帮助</div>
        </div>
    </div>
    <div class="main">
        <div class="top-bar">
            <div class="workspace"><i class="fas fa-moon" style="color:#2EE6D3;"></i> 运维中心 · 星夜</div>
            <div class="user-area">
                <i class="fas fa-bell" style="color:#9B6DFF;"></i>
                <div class="avatar"></div>
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <h2 style="font-weight:400;">夜巡模式, 陈晨</h2>
            <p style="color:#99b8d4;">实时查询延迟 / 性能分析</p>
        </div>
        <div class="card-grid">
            <div class="stat-card"><div class="stat-title">实时QPS</div><div class="stat-number">87</div><span>峰值 124</span></div>
            <div class="stat-card"><div class="stat-title">慢查询</div><div class="stat-number">3</div><span>已优化2条</span></div>
            <div class="stat-card"><div class="stat-title">存储节点</div><div class="stat-number">6</div><span>全部在线</span></div>
        </div>
        <div class="input-section">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="输入 SQL 或自然语言…" value="订单延迟分析">
            <button class="send-btn"><i class="fas fa-arrow-right"></i></button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div>
                <div class="section-title"><i class="fas fa-history" style="color:#2EE6D3;"></i> 最近诊断</div>
                <div class="recent-list">
                    <div class="recent-item"><i class="fas fa-chart-line"></i> 平均响应时间 <span class="badge">236ms</span></div>
                    <div class="recent-item"><i class="fas fa-database"></i> MySQL主从延迟 <span class="badge">2s</span></div>
                    <div class="recent-item"><i class="fas fa-exclamation-triangle"></i> 死锁检测 <span class="badge">0</span></div>
                </div>
            </div>
            <div>
                <div class="section-title"><i class="fas fa-star" style="color:#9B6DFF;"></i> 数据源状态</div>
                <div class="recent-list">
                    <div class="recent-item"><i class="fas fa-check-circle" style="color:#2EE6D3;"></i> 生产MySQL <span class="badge">已连接</span></div>
                    <div class="recent-item"><i class="fas fa-exclamation-circle" style="color:#ff8a5c;"></i> Oracle-分析 <span class="badge">异常</span></div>
                    <div class="recent-item"><i class="fas fa-database"></i> ClickHouse <span class="badge">97%</span></div>
                </div>
            </div>
        </div>
        <hr>
        <div style="display: flex; gap: 24px; color:#8aa9c9;">
            <span><i class="fas fa-microchip"></i> 模型: DeepSeek-R1</span>
            <span><i class="fas fa-shield-alt"></i> 安全审计中</span>
        </div>
    </div>
</body>
</html>
